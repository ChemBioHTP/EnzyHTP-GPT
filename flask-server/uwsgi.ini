[uwsgi]
project=flask-server
base=/var/www

chdir=%(base)/%(project)

; How many tasks to be processed at the same time.
master = true
processes = 8
threads = 4
enable-threads = True

; Here directly use uwsgi as web server, use http.
http=0.0.0.0:8000
buffer-size=131071

; Flask app entry point.
wsgi-file=server.py
callable=app

; Set a request timeout (seconds). Responses runtime may perform multiple
; sequential LLM calls in one request (e.g., confirm & continue), so keep this
; higher than provider tail latency.
harakiri=600
http-timeout=600
socket-timeout=600

; When a request is killed by harakiri, a log will be output
harakiri-verbose=true
