# User-defined Nginx configuration file

# Load modules
load_module modules/ngx_http_ssl_module.so;

events {
    worker_connections  1024;
}

http {
    # Define the log format
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # Set the paths for SSL certificate and key
    ssl_certificate     /etc/nginx/ssl/nginx.crt; # Update with your SSL certificate path
    ssl_certificate_key /etc/nginx/ssl/nginx.key; # Update with your SSL key path

    # HTTP server configuration
    server {
        listen       80;
        server_name  localhost;

        # Redirect all HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server configuration
    server {
        listen       443 ssl;
        server_name  localhost;

        # SSL configuration
        ssl_protocols       TLSv1 TLSv1.1 TLSv1.2;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Reverse proxy configuration
        location /api/ {
            proxy_pass         http://host.docker.internal:12306/api/;  # Proxy to host machine's port 12306
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
